<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWS DevOps Internship</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: #ffffff;
    color: #14202b;
    font-family: 'Inter', 'Segoe UI', Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  /* soft layered background, no crossing grid lines */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 12% 8%, rgba(31,111,235,0.12), transparent 42%),
      radial-gradient(circle at 88% 92%, rgba(255,153,0,0.10), transparent 42%),
      radial-gradient(#dbe6f5 1px, transparent 1px);
    background-size: auto, auto, 26px 26px;
    z-index: -1;
  }

  .page {
    width: 100%;
    max-width: 780px;
    text-align: center;
  }

  h1 {
    font-family: 'Poppins', Georgia, serif;
    font-size: 48px;
    font-weight: 700;
    color: #1f6feb;
    letter-spacing: 0.3px;
  }

  h2 {
    margin-top: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: #4a6786;
  }

  .divider {
    height: 3px;
    width: 90px;
    background: #ff9900;
    margin: 26px auto 34px;
    border-radius: 2px;
  }

  h3 {
    text-align: left;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1f6feb;
    margin-bottom: 12px;
  }

  .details {
    width: 100%;
    text-align: left;
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px 20px;
    padding: 14px 4px;
  }

  .label {
    flex: 0 0 auto;
    min-width: 100px;
    color: #1f6feb;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: 0.5px;
  }

  .value {
    flex: 1 1 auto;
    text-align: right;
    color: #14202b;
    font-weight: 500;
    font-size: 19px;
    word-break: break-word;
  }

  .footer {
    margin-top: 30px;
  }

  .submitted {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1f6feb;
    color: #ffffff;
    font-size: 22px;
    font-weight: 700;
    padding: 12px 30px;
    border-radius: 30px;
    letter-spacing: 0.5px;
  }

  .submitted svg { width: 20px; height: 20px; }

  @media (max-width: 480px) {
    h1 { font-size: 32px; }
    h2 { font-size: 17px; }
    .label, .value { font-size: 16px; }
    .submitted { font-size: 17px; padding: 10px 22px; }
    .row { justify-content: flex-start; }
    .value { text-align: left; flex-basis: 100%; }
  }
</style>
</head>
<body>

<div class="page">

  <h1>AWS DevOps Internship</h1>
  <h2>Assignment Submission</h2>
  <div class="divider"></div>

  <h3>Submission Details</h3>
  <div class="details">
    <div class="row"><span class="label">Name</span><span class="value">Yasharth Panwar</span></div>
    <div class="row"><span class="label">College</span><span class="value">Engineering College ,Ajmer</span></div>
    <div class="row"><span class="label">Branch</span><span class="value">Computer Science &amp; Engineering</span></div>
    <div class="row"><span class="label">Email</span><span class="value">panwaryasharth203@gmail.com</span></div>
    <div class="row"><span class="label">Date</span><span class="value">11-07-2026</span></div>
  </div>

  <div class="footer">
    <div class="submitted">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Assignment Submitted
    </div>
  </div>

</div>

</body>
</html>
